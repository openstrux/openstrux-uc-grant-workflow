# Openstrux build configuration (ADR-019)
# Used by `strux build` for the Openstrux-assisted generation path.

target:
  base: typescript@~5.5
  framework: next@^16.0
  orm: prisma@^6.0
  validation: zod@^4.0.0
  runtime: node@>=20

source:
  - "pipelines/**/*.strux"
  - "openspec/specs/**/*.strux"

output:
  dir: ".openstrux/build"
